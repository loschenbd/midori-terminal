# Midori terminal theme — tmux fragment
# Sourced from ~/.tmux.conf by midori-terminal/install.sh (it appends a
# `source-file ~/.config/midori/midori.tmux.conf` line). This owns the midori
# *presentation* only — truecolor, the status bar, pane borders, message style.
# Generic tmux behaviour (key binds, plugins, QoL) stays in your own ~/.tmux.conf
# so this drops cleanly onto any existing config.

# ── Truecolor for Claude Code inside tmux ────────────────────────────────────
# THREE things, each necessary:
#   1. terminal-features RGB — tmux passes 24-bit sequences THROUGH to the outer
#      terminal instead of degrading them to 256-color on OUTPUT.
#   2. COLORTERM=truecolor — apps INSIDE tmux (Claude's chalk-based diff
#      renderer) read this, not terminfo; with TERM=tmux-256color and no
#      COLORTERM they cap at 256-color. tmux <3.6 doesn't set it, so pin it.
#   3. CLAUDE_CODE_TMUX_TRUECOLOR=1 — Claude Code DELIBERATELY clamps its colour
#      depth to 256 whenever $TMUX is set (upstream issue #35148, verified in the
#      2.1.210 binary), overriding COLORTERM. This undocumented var disables that
#      clamp. Without it, (1)+(2) alone still render muddy (48;5;180); with it,
#      diff bands emit exact Midori washes (48;2;221;199;183 = #ddc7b7).
# The shell fragment (zshrc.midori) exports (2)+(3) too — that's what lands them
# in Claude's env at launch; these lines cover non-shell-spawned panes.
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:RGB"
set-environment -g COLORTERM truecolor
set-environment -g CLAUDE_CODE_TMUX_TRUECOLOR 1

# ── Status bar (theme-adaptive via ANSI) ─────────────────────────────────────
# All colors reference ANSI slots, so the bar inherits whichever palette the
# terminal is rendering and retints automatically when macOS appearance flips.
# No hex codes here.
#
# Role mapping:
#   bg/fg          → terminal default (matches each theme's statusline bg)
#   red            → project name (left) + PREFIX indicator
#   green          → active window / active pane border
#   brightblack    → subdued: inactive windows, time, separators

set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=default"

# Generous lengths so the padding doesn't get truncated.
set -g status-left-length  80
set -g status-right-length 50

# Center the window list — gives the bar an airier, more designed feel.
set -g status-justify centre

# Left: session name · window/pane title (#I:#W). Both wrapped in user ranges so
# they're clickable (see the MouseDown1StatusLeft binding below).
set -g status-left "#[range=user|session-rename,fg=brightblack]  #S  #[norange]#[fg=brightblack]·#[range=user|window-rename,fg=brightblack,bold]  #I:#W  #[norange]#[fg=brightblack]│#[default]  "

# Click the session name → rename session; click the window title → rename window.
bind -n MouseDown1StatusLeft {
  if -F '#{==:#{mouse_status_range},session-rename}' {
    command-prompt -p "rename session:" -I "#S" "rename-session -- '%%'"
  } {
    if -F '#{==:#{mouse_status_range},window-rename}' {
      command-prompt -p "rename window:" -I "#W" "rename-window -- '%%'"
    }
  }
}

# Right: PREFIX flag (red, reverse-video — only while waiting) + padded time.
set -g status-right "#{?client_prefix,#[fg=red#,reverse#,bold] PREFIX #[default]  ,}#[fg=brightblack]%H:%M %d-%b  "

# Right-click the status bar → session menu (detach / kill session / kill server).
bind -n MouseDown3Status display-menu -T "#[align=centre]#S" -x M -y S \
  "Detach"         d "detach-client" \
  "" \
  "Kill session"   k "confirm-before -p 'Kill session #S? (y/n)' kill-session" \
  "Kill server"    K "confirm-before -p 'Kill tmux server? (y/n)' kill-server"

# Center (via the window-list slot): the active pane's project directory.
# Collapses per-window rendering to a single centered element (one-window-per-repo
# flow; multi-window users would put the project elsewhere).
setw -g window-status-format         ""
setw -g window-status-current-format "#[fg=red,bold]  #{b:pane_current_path}  #[default]"
setw -g window-status-style          "fg=brightblack"
setw -g window-status-current-style  "default"
setw -g window-status-separator      ""

# ── Pane borders ─────────────────────────────────────────────────────────────
# Inactive borders use the midori --border tone composited over each mode's bg
# (#e1dfd9 on paper, #2f2e2b at night), so they read as muted hairlines. No
# single ANSI slot is subtle in BOTH modes, so the hex is picked at server start
# via if-shell; live appearance flips are retinted by the midori-claude-theme
# launchd watcher (~/.local/bin/midori-claude-theme.sh). Active pane gets a green
# outline (no `bold` — it can render the border slightly wider and look like it's
# protruding).
if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark" \
  "set -g pane-border-style fg=#2f2e2b" \
  "set -g pane-border-style fg=#e1dfd9"
set -g pane-active-border-style "fg=green"

# Thin single-line border characters and color-only active indicator (no arrow
# tips that would appear to extend past the pane corners).
set -g pane-border-lines       single
set -g pane-border-indicators  colour

# Command-prompt / display-message styling.
set -g message-style "fg=green,bold,reverse"
