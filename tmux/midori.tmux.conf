# Midori terminal theme — tmux fragment
# Sourced from ~/.tmux.conf by midori-terminal/install.sh.
# Status bar and messages use ANSI names only (theme-agnostic); pane borders
# are the one place that needs per-mode hexes — no single ANSI slot reads as
# a subtle hairline in BOTH modes (light wants darker-than-cream, dark wants
# lighter-than-charcoal). Picked at server start via if-shell; live
# appearance flips are retinted by the midori-claude-theme launchd watcher.

set -g status-style "bg=default,fg=default"

# Pane borders — inactive borders use the midori --border tone composited
# over each mode's bg (#e1dfd9 on paper, #2f2e2b at night).
if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark" \
  "set -g pane-border-style fg=#2f2e2b" \
  "set -g pane-border-style fg=#e1dfd9"
# Active pane gets a green outline (no `bold` — bold can render the border
# slightly wider in some fonts and looks like the line is "protruding").
set -g pane-active-border-style "fg=green"

# Thin single-line border characters and color-only active indicator
# (no arrow tips that would appear to extend past the pane corners).
set -g pane-border-lines       single
set -g pane-border-indicators  colour

# Command-prompt / display-message styling.
set -g message-style "fg=green,bold,reverse"
